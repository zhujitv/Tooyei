name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tooyei-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      INQUIRY_NOTIFICATION_EMAIL: ${{ secrets.INQUIRY_NOTIFICATION_EMAIL }}
      NEXT_PUBLIC_SITE_URL: https://tooyei.vercel.app

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link Vercel project
        run: npx vercel@56.2.1 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Verify source
        run: npm run lint && npm run typecheck

      - name: Build production output
        run: npx vercel@56.2.1 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production output
        run: |
          env_args=(
            --env "DATABASE_URL=$DATABASE_URL"
            --env "ADMIN_EMAIL=$ADMIN_EMAIL"
            --env "ADMIN_PASSWORD_HASH=$ADMIN_PASSWORD_HASH"
            --env "ADMIN_SESSION_SECRET=$ADMIN_SESSION_SECRET"
            --env "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL"
          )
          if [ -n "$RESEND_API_KEY" ]; then env_args+=(--env "RESEND_API_KEY=$RESEND_API_KEY"); fi
          if [ -n "$RESEND_FROM_EMAIL" ]; then env_args+=(--env "RESEND_FROM_EMAIL=$RESEND_FROM_EMAIL"); fi
          if [ -n "$INQUIRY_NOTIFICATION_EMAIL" ]; then env_args+=(--env "INQUIRY_NOTIFICATION_EMAIL=$INQUIRY_NOTIFICATION_EMAIL"); fi
          npx vercel@56.2.1 deploy --prebuilt --prod --token="$VERCEL_TOKEN" "${env_args[@]}"
